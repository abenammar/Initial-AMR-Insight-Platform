apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: amr-insight
spec:
  selector: { app: backend }
  ports: [{ port: 8080, targetPort: 8080 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: amr-insight
spec:
  replicas: 2
  selector: { matchLabels: { app: backend } }
  template:
    metadata: { labels: { app: backend } }
    spec:
      containers:
        - name: backend
          image: ghcr.io/example/amr-insight-backend:latest
          ports: [{ containerPort: 8080 }]
          envFrom:
            - configMapRef: { name: amr-config }
            - secretRef: { name: amr-secrets }
          readinessProbe: { httpGet: { path: /actuator/health/readiness, port: 8080 }, initialDelaySeconds: 20 }
          livenessProbe: { httpGet: { path: /actuator/health/liveness, port: 8080 }, initialDelaySeconds: 30 }
          resources:
            requests: { cpu: 200m, memory: 384Mi }
            limits: { cpu: "1", memory: 1Gi }
