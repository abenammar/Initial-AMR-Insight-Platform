apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: amr-insight
spec:
  selector: { app: frontend }
  ports: [{ port: 80, targetPort: 80 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: amr-insight
spec:
  replicas: 2
  selector: { matchLabels: { app: frontend } }
  template:
    metadata: { labels: { app: frontend } }
    spec:
      containers:
        - name: frontend
          image: ghcr.io/example/amr-insight-frontend:latest
          ports: [{ containerPort: 80 }]
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { cpu: 300m, memory: 256Mi }
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: amr-insight
  namespace: amr-insight
spec:
  rules:
    - host: amr.example.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: { service: { name: frontend, port: { number: 80 } } }
